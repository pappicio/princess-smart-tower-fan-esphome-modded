globals:
  - id: current_speed
    type: int
    initial_value: '1'
  - id: user_swing_target
    type: bool
    initial_value: 'false'
  - id: current_mode_bits
    type: uint8_t
    initial_value: '0x00'
  - id: current_timer_steps
    type: int
    initial_value: '0'
  - id: syncing_from_uart
    type: bool
    initial_value: 'false'
  - id: last_frame_byte3
    type: uint8_t
    initial_value: '0xFF'
  - id: last_frame_byte4
    type: uint8_t
    initial_value: '0xFF'
  - id: last_timer_steps
    type: int
    initial_value: '-1'
  - id: second_minute_tick
    type: bool
    initial_value: 'false'
  - id: is_command
    type: bool
    initial_value: 'false'
    
# ... (mantieni le tue esistenti)
  - id: current_beep_mode
    type: uint8_t
    initial_value: '0'
    restore_value: true


select:
  - platform: template
    optimistic: true
    name: "Modalità Feedback Sonoro"
    id: beep_mode_select
    options:
      - "Nessun Suono"
      - "Beep Breve"
      - "Beep Lungo"
    initial_option: "Nessun Suono"
    on_value:
      then:
        - lambda: |-
            if (x == "Nessun Suono") id(current_beep_mode) = 0;
            else if (x == "Beep Breve") id(current_beep_mode) = 1;
            else if (x == "Beep Lungo") id(current_beep_mode) = 2;
        # Emettiamo un beep di test immediato se non è "Nessun Suono"
        - if:
            condition:
              lambda: 'return id(current_beep_mode) > 0;'
            then:
              - lambda: |-
                  uint8_t cmd_beep = 0xA0 + id(current_beep_mode);
                  uint8_t p[4] = {0xAA, cmd_beep, 0x00, 0x00}; // Inviamo un comando neutro
                  id(is_command) = true;
                  id(fan_uart).write_array(p, 4);

  - platform: template
    optimistic: true
    name: "Modalità Ventilazione"
    id: fan_mode_select
    options:
      - "Normal"
      - "Natural"
      - "Sleep"
    initial_option: "Normal"
    on_value:
      then:
        - lambda: |-
            if (x == "Normal") id(current_mode_bits) = 0x00;
            else if (x == "Natural") id(current_mode_bits) = 0x08;
            else if (x == "Sleep") id(current_mode_bits) = 0x10;
        - script.execute: send_fan_packet

          
script:
  - id: send_fan_packet
    then:
      - lambda: |-
          uint8_t v = (id(current_speed) == 1) ? 0x03 : (id(current_speed) == 2 ? 0x05 : 0x07);
          uint8_t timer_low = (id(current_timer_steps) >> 2) & 0x3F;
          uint8_t timer_high = id(current_timer_steps) & 0x03;
          uint8_t s = id(user_swing_target) ? 0x40 : 0x00;
          uint8_t byte3 = timer_low | s;
          uint8_t byte4 = v | id(current_mode_bits) | (timer_high << 6);
          uint8_t p[4] = {0xAA, 0xA0, byte3, byte4};

          std::string mode_str = "normal";
          if (id(current_mode_bits) == 0x08) mode_str = "natural";
          else if (id(current_mode_bits) == 0x10) mode_str = "sleep";

          ESP_LOGI("fan_command", "Invio comando: %02X %02X %02X %02X (speed=%d swing=%d mode=0x%02X (%s) timer=%d (%d minuti))",
                   p[0], p[1], p[2], p[3],
                   id(current_speed), id(user_swing_target), id(current_mode_bits), mode_str.c_str(),
                   id(current_timer_steps), id(current_timer_steps) * 2);
          id(is_command) = true;
          id(fan_uart).write_array(p, 4);
          

interval:
  - interval: 20ms
    then:
      - lambda: |-
          static uint8_t buf[4];
          static int idx = 0;
          uint8_t byte;
          while (id(fan_uart).available()) {
            id(fan_uart).read_byte(&byte);
            buf[idx++] = byte;
            if (idx == 2 && !(buf[0] == 0xAA && buf[1] == 0xA0)) {
              idx = 0;
              continue;
            }

            if (idx == 4) {
              // Filtro anti-spam: se il pacchetto è identico al precedente, non ri-pubblichiamo
              if (buf[2] == id(last_frame_byte3) && buf[3] == id(last_frame_byte4)) {
                idx = 0;
                continue;
              }
              id(last_frame_byte3) = buf[2];
              id(last_frame_byte4) = buf[3];

              // --- PARSING DEL PACCHETTO ---
              bool swing = (buf[2] & 0x40) != 0;
              uint8_t timer_low = buf[2] & 0x3F;
              uint8_t speed_bits = buf[3] & 0x07;
              bool natural = (buf[3] & 0x08) != 0;
              bool sleep = (buf[3] & 0x10) != 0;
              uint8_t timer_high = (buf[3] >> 6) & 0x03;
              int timer_steps = (timer_low << 2) | timer_high;

              int speed = 0;
              if (speed_bits == 0x03) speed = 1;
              else if (speed_bits == 0x05) speed = 2;
              else if (speed_bits == 0x07) speed = 3;

              if (timer_steps != id(last_timer_steps)) {
                id(last_timer_steps) = timer_steps;
                id(second_minute_tick) = false;
              } else {
                id(second_minute_tick) = true;
              }

              int minuti_precisi;
              if (timer_steps == 0) {
                minuti_precisi = 0;
              } else {
                minuti_precisi = (timer_steps * 2) - (id(second_minute_tick) ? 1 : 0);
              }

              uint8_t mode_bits = natural ? 0x08 : (sleep ? 0x10 : 0x00);

              ESP_LOGI("fan_feedback", "Risposta ric.: %02X %02X %02X %02X (speed=%d swing=%d mode=0x%02X (%s) timer=%d (-%d minuti))",
              buf[0], buf[1], buf[2], buf[3],
              speed, swing, mode_bits, natural ? "natural" : (sleep ? "sleep" : "normal"), timer_steps, minuti_precisi);

              
              // LOGICA BEEPER: Se abbiamo ricevuto conferma (AA A0) e un beep è selezionato
              if (buf[0] == 0xAA && buf[1] == 0xA0 && id(is_command) == true && id(current_beep_mode) > 0) {
                uint8_t cmd_beep = 0xA0 + id(current_beep_mode);
                uint8_t p[4] = {0xAA, cmd_beep, 0x00, 0x00}; // Inviamo un comando neutro
                id(fan_uart).write_array(p, 4);
                id(is_command) = false;
              }

              id(current_speed) = (speed > 0) ? speed : id(current_speed);
              id(user_swing_target) = swing;
              id(current_mode_bits) = natural ? 0x08 : (sleep ? 0x10 : 0x00);
              id(current_timer_steps) = timer_steps;

              id(syncing_from_uart) = true;

              auto call = id(princess_fan).make_call();
              call.set_state(speed > 0);
              if (speed > 0) call.set_speed(speed);
              call.set_oscillating(swing);
              if (natural) call.set_preset_mode("Natural");
              else if (sleep) call.set_preset_mode("Sleep");
              else call.set_preset_mode("Normal");
              call.perform();



              
              id(fan_timer_number).publish_state(timer_steps * 2);


              
              int ore = minuti_precisi / 60;
              int min_resto = minuti_precisi % 60;
              std::string timer_readable;

              if (minuti_precisi <= 0) {
                timer_readable = "Off";
              } else if (ore == 0) {
                timer_readable = "-" + std::to_string(min_resto) + " minuti";
              } else if (min_resto == 0) {
                timer_readable = "-" + std::to_string(ore) + (ore == 1 ? " ora" : " ore");
              } else {
                timer_readable = "-" + std::to_string(ore) + (ore == 1 ? " ora e " : " ore e ") + std::to_string(min_resto) + " minuti";
              }

              id(fan_timer_readable).publish_state(timer_readable);


              
              std::string mode = "normal";
              if (natural) mode = "natural";
              if (sleep) mode = "sleep";
              id(fan_mode_sensor).publish_state(mode);
              
              std::string speed_str = (speed == 0) ? "Off" : ("Velocità " + std::to_string(speed));
              id(fan_speed_sensor).publish_state(speed_str);
              
              id(syncing_from_uart) = false;

              idx = 0;
            }
          }
          
          
fan:
  - platform: template
    name: "Ventilatore"
    id: princess_fan
    speed_count: 3
    has_oscillating: true
    restore_mode: ALWAYS_OFF
    preset_modes:
      - "Normal"
      - "Natural"
      - "Sleep"
    on_turn_on:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - script.execute: send_fan_packet
    on_turn_off:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - lambda: |-
                ESP_LOGI("fan_command", "Invio comando: AA A0 00 02 (OFF)");
                uint8_t p[4] = {0xAA, 0xA0, 0x00, 0x02};
                id(is_command) = true;
                id(fan_uart).write_array(p, 4);
    on_speed_set:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - lambda: 'id(current_speed) = (int) x;'
            - script.execute: send_fan_packet

    on_oscillating_set:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - lambda: 'id(user_swing_target) = x;'
            - script.execute: send_fan_packet
    on_preset_set:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - lambda: |-
                std::string mode = x;
                if (mode == "Natural") {
                  id(current_mode_bits) = 0x08;
                  id(fan_mode_sensor).publish_state("Natural");
                } else if (mode == "Sleep") {
                  id(current_mode_bits) = 0x10;
                  id(fan_mode_sensor).publish_state("Sleep");
                } else {
                  id(current_mode_bits) = 0x00;
                  id(fan_mode_sensor).publish_state("Normal");
                }
            - script.execute: send_fan_packet

button:

  - platform: restart
    name: "riavvio"
    #entity_category: config
    entity_category: diagnostic   # <- lo sposta su Diagnostic
    web_server:
      sorting_weight: 300
  - platform: template
    name: "Velocità 1"
    on_press:
      - lambda: |-
          id(current_speed) = 1;
      - script.execute: send_fan_packet

  - platform: template
    name: "Velocità 2"
    on_press:
      - lambda: |-
          id(current_speed) = 2;
      - script.execute: send_fan_packet

  - platform: template
    name: "Velocità 3"
    on_press:
      - lambda: |-
          id(current_speed) = 3;
      - script.execute: send_fan_packet

switch:
  - platform: template
    name: "Swing"
    id: swing_switch
    lambda: |-
      return id(user_swing_target);
    turn_on_action:
      - lambda: 'id(user_swing_target) = true;'
      - script.execute: send_fan_packet
    turn_off_action:
      - lambda: 'id(user_swing_target) = false;'
      - script.execute: send_fan_packet
        
number:
  - platform: template
    name: "Ventilatore Timer (minuti)"
    id: fan_timer_number
    min_value: 0
    max_value: 480
    step: 10
    unit_of_measurement: "min"
    optimistic: true
    set_action:
      - if:
          condition:
            lambda: "return !id(syncing_from_uart);"
          then:
            - lambda: |-
                id(current_timer_steps) = (int)(x / 2);

                int minuti = (int) x;
                int ore = minuti / 60;
                int min_resto = minuti % 60;
                std::string timer_readable;

                if (minuti <= 0) {
                  timer_readable = "Off";
                } else if (ore == 0) {
                  timer_readable = std::to_string(min_resto) + " minuti";
                } else if (min_resto == 0) {
                  timer_readable = std::to_string(ore) + (ore == 1 ? " ora" : " ore");
                } else {
                  timer_readable = std::to_string(ore) + (ore == 1 ? " ora e " : " ore e ") + std::to_string(min_resto) + " minuti";
                }
                id(fan_timer_readable).publish_state(timer_readable);
            - script.execute: send_fan_packet


time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Rome"
    update_interval: 12h
    servers: 
      - "0.pool.ntp.org"
      - "1.pool.ntp.org"
      - "2.pool.ntp.org" 
    on_time_sync:
      then:
        - if:
            condition:
              lambda: 'return id(device_last_restart).state == "";'
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  state: !lambda |-
                    static const char* giorni[] = { "Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab" };
                    static const char* mesi[] = { "Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic" };
                    auto now = id(sntp_time).now();
                    char buffer[40];
                    snprintf(buffer, sizeof(buffer), "%s %02d %s %04d - %02d:%02d:%02d",
                      giorni[now.day_of_week % 7],
                      now.day_of_month,
                      mesi[now.month - 1],
                      now.year,
                      now.hour,
                      now.minute,
                      now.second
                    );
                    return std::string(buffer);
#########################################################################
          
