esphome:
  name: princess-fan
  friendly_name: "Ventilatore"
  on_boot:
    priority: -100
    then:
      - delay: 1000ms
      - lambda: |-
          ESP_LOGW("boot_safety", "Ritorno corrente: inizializzo stato a SPENTO.");
          
          // Allineamento Mode Bits (Normal=0x00, Natural=0x08, Sleep=0x10)
          if (id(current_mode_bits) == 0x00) id(fan_mode_select).publish_state("Normal");
          else if (id(current_mode_bits) == 0x08) id(fan_mode_select).publish_state("Natural");
          else if (id(current_mode_bits) == 0x10) id(fan_mode_select).publish_state("Sleep");

          if (id(current_beep_mode) == 0) id(beep_mode_select).publish_state("Nessun Suono");
          else if (id(current_beep_mode) == 1) id(beep_mode_select).publish_state("Beep Breve");
          else if (id(current_beep_mode) == 2) id(beep_mode_select).publish_state("Beep Lungo");
          
          //id(current_speed) = 1;
          //id(user_swing_target) = false;
          //id(current_mode_bits) = 0x00;
          id(current_timer_steps) = 0;
          //id(fan_mode_sensor).publish_state("Normal");
          uint8_t packet[4] = {0xAA, 0xA0, 0x00, 0x02};
          id(is_command) = false;
          id(fan_uart).write_array(packet, 4);



# =======================================================
# SCHEMA DI COLLEGAMENTO PER FLASHARE LA BASSETTA AS22WIFI-B
# =======================================================
#
#    ADATTATORE USB-SERIALE                  BASETTA AS22WIFI-B
#      (Impostato a 3.3V)                     (Vista dal retro)
#    +--------------------+               +-----------------------+
# 
#    |               3.3V |-------------->| +3V3                  | (Connettore
#    |                GND |-------------->| GND                   |  principale
#    |                 RX |-------------->| TXD                   |  a 4 PIN)
#    |                 TX |-------------->| RXD                   |
#    +--------------------+               +-----------------------+
# 
#                                         |                       |
#                                         |   +---------------+   |
#                                         |   | CORTOCIRCUITO |   |
#                                         |   |  Fisso durante|   |
#                                         |   |   il Flash    |   |
#                                         |   v               v   |
#                                         | [GND]           [IO0] | (Connettore
#                                         +-----------------------+  a 2 PIN)
#
# ISTRUZIONI:
# 1. Unisci GND e IO0 sul connettore inferiore a 2 pin con un ponticello.
# 2. Collega i 4 pin in alto all'adattatore USB incrociando RX e TX.
# 3. Inserisci l'adattatore nel PC (l'ESP si avvia in Flash Mode).
# 4. Lancia l'installazione da ESPHome.
# 5. A fine flash, stacca la USB, RIMUOVI il ponticello e riaccendi.
# =======================================================


